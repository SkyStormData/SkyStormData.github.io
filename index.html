<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SkyStorm Data</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0f1a;
    color: white;
}

/* Top Bar */
.header {
    padding: 12px;
    background: #111827;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.status {
    font-size: 12px;
    color: #4ade80;
}

/* Alert Banner */
#alertBar {
    display: none;
    padding: 10px;
    background: red;
    text-align: center;
    font-weight: bold;
}

/* Layout */
.container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    padding: 10px;
}

/* Map */
#map {
    height: 300px;
    border-radius: 12px;
    overflow: hidden;
}

/* Safe ring */
#safeRing {
    position: absolute;
    width: 120px;
    height: 120px;
    border: 3px solid #4ade80;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
}

/* Stream box */
.stream {
    background: #111827;
    padding: 10px;
    border-radius: 12px;
}

/* PWA Button */
#installBtn {
    position: fixed;
    bottom: 15px;
    right: 15px;
    background: #4ade80;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    display: none;
}
</style>
</head>

<body>

<div class="header">
    <div>🌩️ SkyStorm Data</div>
    <div class="status">GPS ACTIVE</div>
</div>

<div id="alertBar">⚠️ NO ACTIVE WARNINGS</div>

<div class="container">

    <!-- MAP -->
    <div id="map"></div>
    <div id="safeRing"></div>

    <!-- STREAM -->
    <div class="stream">
        <h3>📺 Live Stream</h3>
        <div id="streamBox">
            Stream Active Area (already working system stays here)
        </div>
    </div>

</div>

<button id="installBtn">Install App</button>

<!-- Leaflet (satellite map base) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// -------------------- MAP --------------------
let map = L.map('map').setView([38.6, -86.1], 6);

// Satellite-style layer
L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// -------------------- SAFE RING --------------------
let ring = document.getElementById("safeRing");

function updateSafeRing(lat, lng) {
    let point = map.latLngToContainerPoint([lat, lng]);
    ring.style.left = point.x + "px";
    ring.style.top = point.y + "px";
}

// fake GPS for now (replace with real GPS later)
let userLat = 38.6;
let userLng = -86.1;

updateSafeRing(userLat, userLng);
map.on("move", () => updateSafeRing(userLat, userLng));

// -------------------- ALERT SYSTEM (clean) --------------------
function setAlert(msg, active) {
    let bar = document.getElementById("alertBar");
    bar.style.display = "block";
    bar.textContent = msg;
    bar.style.background = active ? "red" : "#1f2937";
}

// default safe state
setAlert("🟢 NO ACTIVE WARNINGS", false);

// -------------------- PWA INSTALL --------------------
let installPrompt;
let btn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    installPrompt = e;
    btn.style.display = "block";
});

btn.addEventListener("click", async () => {
    if (installPrompt) {
        installPrompt.prompt();
    }
});
</script>

</body>
</html>
