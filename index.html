<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyStorm Data</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0f;
color:white;
}

nav{
display:flex;
justify-content:space-between;
padding:15px;
background:#111827;
position:fixed;
top:0;
left:0;
right:0;
z-index:999;
}

.brand{color:#f5a623;font-weight:bold;}

.nav-link{
cursor:pointer;
margin-left:10px;
padding:8px 12px;
border-radius:8px;
display:inline-block;
}

.nav-link.active{
background:#f5a62333;
color:#f5a623;
}

.section{
display:none;
padding:90px 15px;
}

.section.active{
display:block;
}

#map{
height:70vh;
border-radius:10px;
}

.stream{
display:grid;
grid-template-columns:1fr 300px;
gap:10px;
}

video{
width:100%;
background:black;
border-radius:10px;
}

.chat{
background:#1a1a25;
border-radius:10px;
display:flex;
flex-direction:column;
height:70vh;
}

.messages{
flex:1;
padding:10px;
overflow-y:auto;
}

.input{
display:flex;
padding:10px;
gap:5px;
}

input{
flex:1;
padding:8px;
border-radius:6px;
border:none;
background:#12121a;
color:white;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#f5a623;
cursor:pointer;
}
</style>
</head>

<body>

<nav>
<div class="brand">SKYSTORM DATA</div>

<div>
<div class="nav-link active" onclick="showTab('home',this)">Home</div>
<div class="nav-link" onclick="showTab('radar',this)">Radar</div>
<div class="nav-link" onclick="showTab('stream',this)">Stream</div>
</div>
</nav>

<!-- HOME -->
<div id="home" class="section active">
<h1>SkyStorm Data</h1>
<p>Storm Tracking Network</p>
</div>

<!-- RADAR -->
<div id="radar" class="section">
<h2>Radar</h2>
<div id="map"></div>
</div>

<!-- STREAM -->
<div id="stream" class="section">
<div class="stream">

<video id="video" autoplay playsinline muted></video>

<div class="chat">
<div class="messages" id="messages"></div>

<div class="input">
<input id="msg" placeholder="Message...">
<button onclick="send()">Send</button>
</div>

</div>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map;

/* FIXED TAB SYSTEM */
function showTab(tab,el){

document.querySelectorAll('.section').forEach(s=>{
s.classList.remove('active');
});

document.getElementById(tab).classList.add('active');

document.querySelectorAll('.nav-link').forEach(l=>{
l.classList.remove('active');
});

el.classList.add('active');

if(tab === 'radar'){
setTimeout(()=>{
if(!map) initMap();
map.invalidateSize();
},100);
}
}

/* MAP */
function initMap(){

map = L.map('map').setView([38.9,-86.5],7);

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{attribution:'Esri'}
).addTo(map);

/* SAFE ZONE */
L.circle([38.9,-86.5],{
radius:8000,
color:'#00cc66',
fillColor:'#00cc66',
fillOpacity:0.15
}).addTo(map);

}

/* CHAT */
function send(){
let i=document.getElementById('msg');
if(!i.value.trim()) return;

let div=document.createElement('div');
div.innerHTML="<b>User:</b> "+i.value;

document.getElementById('messages').appendChild(div);
i.value='';
}

/* STREAM */
async function startCam(){
try{
let stream = await navigator.mediaDevices.getUserMedia({video:true,audio:false});
document.getElementById('video').srcObject = stream;
}catch(e){}
}

startCam();

</script>

</body>
</html>
