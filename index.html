<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyStorm Data — Storm Operations Network</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
--bg-primary:#0a0a0f;
--bg-secondary:#12121a;
--bg-card:#1a1a25;
--accent-primary:#f5a623;
--text-primary:#fff;
--text-secondary:#a0a0b0;
--safe:#00cc66;
--danger:#ff3b3b;
--border-color:#2a2a3a;
--radius:12px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:var(--bg-primary);
color:var(--text-primary);
overflow-x:hidden;
}

/* NAV */
.main-nav{
position:fixed;
top:0;
left:0;
right:0;
z-index:1000;
display:flex;
justify-content:space-between;
align-items:center;
padding:1rem 2rem;
background:rgba(10,10,15,.95);
border-bottom:1px solid var(--border-color);
backdrop-filter:blur(15px);
}

.brand{font-size:1.4rem;font-weight:700;color:var(--accent-primary);}

.nav-links{display:flex;gap:1rem;}

.nav-link{
cursor:pointer;
padding:.7rem 1rem;
border-radius:8px;
transition:.3s;
}

.nav-link:hover{background:var(--bg-card);}
.nav-link.active{background:rgba(245,166,35,.15);color:var(--accent-primary);}

/* SECTIONS */
.section{
display:none;
padding:100px 1rem 2rem;
min-height:100vh;
}

.section.active{display:block;}

/* HOME */
.hero{
display:grid;
grid-template-columns:1fr 1fr;
gap:2rem;
align-items:center;
min-height:80vh;
}

.hero-title{font-size:4rem;font-weight:900;}
.hero-title span{color:var(--accent-primary);}
.hero-sub{color:var(--text-secondary);margin-top:1rem;font-size:1.2rem;}

.radar-box{
height:350px;
border-radius:50%;
border:2px solid var(--accent-primary);
position:relative;
overflow:hidden;
}

.radar-sweep{
position:absolute;
width:50%;
height:50%;
background:linear-gradient(90deg,transparent,rgba(245,166,35,.35));
top:50%;
left:50%;
transform-origin:0 0;
animation:spin 4s linear infinite;
}

@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* RADAR */
#map{
height:75vh;
border-radius:12px;
border:1px solid var(--border-color);
}

/* STREAM */
.stream-layout{
display:grid;
grid-template-columns:1fr 320px;
gap:1rem;
height:80vh;
}

.stream-video{
position:relative;
background:black;
border-radius:12px;
overflow:hidden;
border:1px solid var(--border-color);
}

#live-video{
width:100%;
height:100%;
object-fit:cover;
}

.chat-panel{
display:flex;
flex-direction:column;
background:var(--bg-card);
border-radius:12px;
border:1px solid var(--border-color);
overflow:hidden;
}

.chat-messages{
flex:1;
padding:1rem;
overflow-y:auto;
}

.chat-input{
display:flex;
padding:1rem;
gap:.5rem;
border-top:1px solid var(--border-color);
}

.chat-input input{
flex:1;
padding:.7rem;
border-radius:8px;
border:1px solid var(--border-color);
background:var(--bg-secondary);
color:white;
}

.chat-input button{
background:var(--accent-primary);
border:none;
padding:.7rem 1rem;
border-radius:8px;
cursor:pointer;
}

/* ALERT */
.warning-bar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#1a0000;
color:var(--danger);
padding:.7rem;
font-weight:700;
border-top:1px solid var(--danger);
}

</style>
</head>

<body>

<!-- NAV -->
<nav class="main-nav">
<div class="brand">SKYSTORM DATA</div>

<div class="nav-links">
<div class="nav-link active" onclick="show('home',event)">Home</div>
<div class="nav-link" onclick="show('radar',event)">Radar</div>
<div class="nav-link" onclick="show('stream',event)">Stream</div>
</div>
</nav>

<!-- HOME -->
<section id="home" class="section active">
<div class="hero">
<div>
<h1 class="hero-title">SKY<span>STORM</span></h1>
<p class="hero-sub">Real-Time Storm Tracking & Field Operations</p>
</div>

<div class="radar-box">
<div class="radar-sweep"></div>
</div>
</div>
</section>

<!-- RADAR -->
<section id="radar" class="section">
<h2>📡 Live Radar</h2>
<div id="map"></div>
</section>

<!-- STREAM -->
<section id="stream" class="section">

<div class="stream-layout">

<div class="stream-video">
<video id="live-video" autoplay muted playsinline></video>
</div>

<div class="chat-panel">

<div class="chat-messages" id="chat"></div>

<div class="chat-input">
<input id="msg" placeholder="Message...">
<button onclick="send()">Send</button>
</div>

</div>

</div>

</section>

<!-- WARNING BAR -->
<div class="warning-bar" id="warn">
🟢 SYSTEM NORMAL — NO ACTIVE WARNINGS
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map;
let stream = null;

/* NAV */
function show(id,e){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');

document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
e.target.classList.add('active');

if(id==='radar' && !map){
setTimeout(initMap,100);
}
if(id==='radar' && map){
map.invalidateSize();
}
}

/* MAP */
function initMap(){

map = L.map('map').setView([38.9,-86.5],7);

/* SATELLITE FIX */
L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{attribution:'Esri'}
).addTo(map);

/* SAFE RING */
L.circle([38.9,-86.5],{
radius:8000,
color:'#00cc66',
fillColor:'#00cc66',
fillOpacity:0.15
}).addTo(map);

}

/* CHAT */
function send(){
let i=document.getElementById('msg');
if(!i.value.trim()) return;

let div=document.createElement('div');
div.innerHTML=`<b>Viewer:</b> ${i.value}`;
document.getElementById('chat').appendChild(div);
i.value='';
}

/* STREAM */
async function start(){
try{
stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
document.getElementById('live-video').srcObject = stream;
}catch(e){
console.log(e);
}
}

/* INIT */
start();

</script>

</body>
</html>
