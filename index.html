<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyStorm Data — Ohio Valley Storm Chasing</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg-primary:#0a0a0f;--bg-secondary:#12121a;--bg-card:#1a1a25;--bg-card-hover:#222230;--accent-primary:#f5a623;--accent-secondary:#ff6b35;--accent-glow:rgba(245,166,35,0.3);--text-primary:#fff;--text-secondary:#a0a0b0;--text-muted:#606070;--danger:#ff3b3b;--warning:#ffcc00;--safe:#00cc66;--tornado:#ff00ff;--severe:#ff6600;--flash-flood:#00ff00;--border-color:#2a2a3a;--radius:12px;--radius-sm:8px}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Rajdhani',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden}.main-nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:.75rem 2rem;background:rgba(10,10,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-color)}.nav-brand{display:flex;align-items:center;gap:.75rem}.brand-text{font-family:'Orbitron',sans-serif;font-size:1.25rem;font-weight:700;letter-spacing:2px}.brand-accent{color:var(--accent-primary)}.nav-links{display:flex;gap:.5rem}.nav-link{display:flex;align-items:center;gap:.5rem;padding:.6rem 1rem;color:var(--text-secondary);text-decoration:none;font-weight:500;font-size:.95rem;border-radius:var(--radius-sm);transition:all .3s ease;cursor:pointer}.nav-link:hover{color:var(--text-primary);background:var(--bg-card)}.nav-link.active{color:var(--accent-primary);background:rgba(245,166,35,.1)}.nav-status{display:flex;gap:1rem}.status-indicator{display:flex;align-items:center;gap:.4rem;padding:.4rem .75rem;font-size:.8rem;font-weight:600;border-radius:20px;background:var(--bg-card);border:1px solid var(--border-color)}.status-indicator.safe{color:var(--safe);border-color:var(--safe);box-shadow:0 0 10px rgba(0,204,102,.3)}.status-indicator.caution{color:var(--warning);border-color:var(--warning)}.status-indicator.danger{color:var(--danger);border-color:var(--danger);animation:pulse 1s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}.section{display:none;min-height:100vh;padding:80px 2rem 2rem}.section.active{display:block}.hero{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;min-height:calc(100vh - 200px);padding:2rem 0}.hero-badge{display:inline-block;padding:.5rem 1rem;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));color:var(--bg-primary);font-weight:700;font-size:.85rem;letter-spacing:2px;border-radius:4px;margin-bottom:1rem}.hero-title{font-family:'Orbitron',sans-serif;font-size:3.5rem;font-weight:900;line-height:1.1;margin-bottom:1rem;text-shadow:0 0 40px var(--accent-glow)}.hero-title .highlight{color:var(--accent-primary)}.hero-subtitle{font-size:1.4rem;color:var(--text-secondary);margin-bottom:2rem}.hero-stats{display:flex;gap:2rem}.stat{display:flex;flex-direction:column;align-items:center;padding:1.25rem;background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border-color);min-width:120px}.stat i{font-size:1.5rem;color:var(--accent-primary);margin-bottom:.5rem}.stat-value{font-family:'Orbitron',sans-serif;font-size:1.25rem;font-weight:700}.stat-label{font-size:.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}.radar-animation{position:relative;width:350px;height:350px}.radar-ring{position:absolute;border:2px solid var(--accent-primary);border-radius:50%;opacity:.3}.radar-ring:nth-child(2){width:100%;height:100%;top:0;left:0}.radar-ring:nth-child(3){width:66%;height:66%;top:17%;left:17%}.radar-ring:nth-child(4){width:33%;height:33%;top:33.5%;left:33.5%}.radar-center{position:absolute;width:12px;height:12px;background:var(--accent-primary);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px var(--accent-primary)}.radar-sweep{position:absolute;width:50%;height:50%;top:50%;left:50%;transform-origin:0 0;background:linear-gradient(90deg,transparent,var(--accent-glow));animation:radar-spin 4s linear infinite;border-radius:0 100% 0 0}@keyframes radar-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}#map{width:100%;height:500px;border-radius:var(--radius);border:1px solid var(--border-color);margin-bottom:2rem}body{overflow-x:hidden}/* minimal responsive */@media(max-width:768px){.hero{grid-template-columns:1fr;text-align:center}.hero-stats{justify-content:center}.radar-animation{display:none}}
    </style>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-brand"><span class="brand-text">SKYSTORM<span class="brand-accent">DATA</span></span></div>
        <div class="nav-links">
            <a class="nav-link active" data-section="home"><i class="fas fa-home"></i> <span>Home</span></a>
            <a class="nav-link" data-section="radar"><i class="fas fa-satellite-dish"></i> <span>Radar</span></a>
            <a class="nav-link" data-section="data"><i class="fas fa-chart-line"></i> <span>Data</span></a>
            <a class="nav-link" data-section="gallery"><i class="fas fa-images"></i> <span>Gallery</span></a>
        </div>
        <div class="nav-status">
            <span id="gps-status" class="status-indicator"><i class="fas fa-location-crosshairs"></i> GPS</span>
            <span id="alert-status" class="status-indicator safe"><i class="fas fa-shield"></i> SAFE</span>
        </div>
    </nav>

    <!-- Home Section -->
    <section id="home" class="section active">
        <div class="hero">
            <div>
                <span class="hero-badge">OHIO VALLEY STORM CHASING</span>
                <h1 class="hero-title">Welcome to <span class="highlight">SkyStorm Data</span></h1>
                <p class="hero-subtitle">Real-time storm tracking, live radar, and storm chase data for the Ohio Valley.</p>
                <div class="hero-stats">
                    <div class="stat"><i class="fas fa-temperature-high"></i><span class="stat-value">72°F</span><span class="stat-label">Temp</span></div>
                    <div class="stat"><i class="fas fa-wind"></i><span class="stat-value">12 mph</span><span class="stat-label">Wind</span></div>
                    <div class="stat"><i class="fas fa-tint"></i><span class="stat-value">0.0"</span><span class="stat-label">Rain</span></div>
                </div>
            </div>
            <div class="radar-animation">
                <div class="radar-ring"></div>
                <div class="radar-ring"></div>
                <div class="radar-ring"></div>
                <div class="radar-center"></div>
                <div class="radar-sweep"></div>
            </div>
        </div>
    </section>

    <!-- Radar Section -->
    <section id="radar" class="section">
        <div class="radar-container">
            <h2 style="color:var(--accent-primary);margin-bottom:1rem"><i class="fas fa-satellite-dish"></i> Live Radar</h2>
            <div id="map"></div>
        </div>
    </section>

    <!-- Data Section -->
    <section id="data" class="section">
        <h2 style="color:var(--accent-primary);margin-bottom:1rem"><i class="fas fa-chart-line"></i> Live Data</h2>
        <p style="color:var(--text-secondary)">Data panels coming soon...</p>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="section">
        <h2 style="color:var(--accent-primary);margin-bottom:1rem"><i class="fas fa-images"></i> Gallery</h2>
        <p style="color:var(--text-secondary)">Gallery images coming soon...</p>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // NAVIGATION SWITCHING
        const links = document.querySelectorAll('.nav-link');
        const sections = document.querySelectorAll('.section');
        links.forEach(link => {
            link.addEventListener('click', () => {
                links.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                const sectionId = link.dataset.section;
                sections.forEach(sec => sec.classList.remove('active'));
                document.getElementById(sectionId).classList.add('active');
            });
        });

        // GPS / ALERT SIMULATION
        const gpsStatus = document.getElementById('gps-status');
        const alertStatus = document.getElementById('alert-status');
        setInterval(() => {
            gpsStatus.textContent = 'GPS: ' + (Math.random() > 0.1 ? 'ON' : 'OFF');
            const rand = Math.random();
            if(rand < 0.7){
                alertStatus.textContent = 'SAFE';
                alertStatus.className = 'status-indicator safe';
            } else if(rand < 0.9){
                alertStatus.textContent = 'CAUTION';
                alertStatus.className = 'status-indicator caution';
            } else{
                alertStatus.textContent = 'DANGER';
                alertStatus.className = 'status-indicator danger';
            }
        }, 3000);

        // LEAFLET MAP
        const map = L.map('map').setView([38.5, -85.7], 7); // Ohio Valley default
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        // Dummy radar overlay
        const radarUrl = 'https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=demo';
        L.tileLayer(radarUrl, {opacity:0.4}).addTo(map);
    </script>
</body>
</html>
